name: Release
on:
  push:
    tags: ["v*"]

jobs:
  dmg:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Icon toolchain
        run: pip3 install --break-system-packages pillow
      - name: Build DMG
        # CI has no signing identity — release.sh falls back to ad-hoc.
        # Swap in Developer ID signing via secrets when available.
        run: ./scripts/release.sh
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          generate_release_notes: true
